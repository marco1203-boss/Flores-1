<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ori ✨</title>
    <style>
        /* Fondo degradado como el de tu imagen */
        body { 
            margin: 0; 
            background: radial-gradient(circle, #008080 0%, #004d4d 100%); 
            color: white; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        #intro { 
            position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            z-index: 100; text-align: center; cursor: pointer;
        }

        .flower { position: relative; width: 200px; height: 350px; display: none; }
        
        /* Tallo y hojas */
        .stem { 
            position: absolute; width: 8px; height: 220px; 
            background: #2e7d32; left: 96px; top: 120px; 
            border-radius: 4px; z-index: 1;
        }
        .leaf {
            position: absolute; width: 40px; height: 25px;
            background: #2e7d32; border-radius: 0 50% 0 50%;
            left: 104px; top: 200px; transform: rotate(10deg);
        }

        /* Centro del Girasol */
        .center { 
            position: absolute; width: 70px; height: 70px; 
            background: #3e2723; border-radius: 50%; 
            left: 65px; top: 65px; z-index: 10; 
            box-shadow: inset 0 0 15px #000; 
        }
        
        /* Pétalos realistas */
        .petal { 
            position: absolute; width: 35px; height: 95px; 
            background: #ffeb3b; border-radius: 50% 50% 10% 10%; 
            left: 82.5px; top: 0px; 
            transform-origin: bottom center; 
            transition: transform 1.5s ease-in, opacity 1s, top 2s ease-in; 
            border: 1px solid #fbc02d; 
            cursor: pointer; z-index: 5;
        }

        .message-box { 
            position: absolute; top: 10%; width: 100%; 
            text-align: center; font-size: 1.6em; 
            font-weight: bold; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); 
        }

        #final-msg {
            display: none; position: absolute; width: 100%;
            text-align: center; font-size: 2.2em; color: #fff;
            text-shadow: 0 0 20px #ffeb3b; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="intro" onclick="start()">
        <h1 style="font-size: 2em;">Esto es para ti, Ori...</h1>
        <p style="font-size: 1.2em;">Presiona la pantalla para ver tu flor ✨</p>
    </div>

    <div id="flower-cont" class="flower">
        <div class="stem"></div>
        <div class="leaf"></div>
        <div id="flower-center" class="center"></div>
        <div id="petals"></div>
    </div>

    <div id="msg" class="message-box"></div>
    <div id="final-msg">¡Felicidades por tu investidura!<br>TQM ORI ❤️🎓</div>

    <script>
        const words = ["Inteligente", "Esforzada", "Brillante", "Capaz", "Admirable", "Exitosa", "Perseverante", "Dedicada", "Valiente", "Única"];
        let pCount = 12;

        function start() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('flower-cont').style.display = 'block';
            const box = document.getElementById('petals');
            
            // Creamos 12 pétalos amarillos
            for (let i = 0; i < pCount; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.transform = `rotate(${i * 30}deg)`;
                p.onclick = (e) => {
                    e.stopPropagation();
                    drop(p, i);
                };
                box.appendChild(p);
            }
        }

        function drop(p, index) {
            if (p.getAttribute('data-dropped')) return;
            p.setAttribute('data-dropped', 'true');
            
            // El pétalo se cae y desaparece
            p.style.top = '600px';
            p.style.opacity = '0';
            p.style.transform += ' rotate(45deg)';
            
            // Sale la palabra bonita
            const m = document.getElementById('msg');
            m.innerText = words[index % words.length];
            m.style.opacity = '1';
            
            pCount--;
            
            // Cuando no quedan pétalos, cae el centro y sale el mensaje final
            if (pCount === 0) {
                setTimeout(() => {
                    document.getElementById('flower-center').style.top = '600px';
                    document.getElementById('flower-center').style.opacity = '0';
                    document.querySelector('.stem').style.opacity = '0';
                    document.querySelector('.leaf').style.opacity = '0';
                    m.style.display = 'none';
                    document.getElementById('final-msg').style.display = 'block';
                }, 1000);
            } else {
                // Borrar la palabra después de un momento para la siguiente
                setTimeout(() => { if(pCount > 0) m.innerText = ""; }, 1500);
            }
        }
    </script>
</body>
</html>
