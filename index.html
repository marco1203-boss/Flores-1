<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Investidura_Ori</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: crosshair; }
        
        /* Fondo: Río de Datos Fluyente */
        .grid-background { position: absolute; width: 200%; height: 200%; background: linear-gradient(#0ff 1px, transparent 1px), linear-gradient(90deg, #0ff 1px, transparent 1px); background-size: 30px 30px; opacity: 0.1; animation: gridScroll 30s linear infinite; z-index: -2; }
        @keyframes gridScroll { from { transform: translate(-25%, -25%); } to { transform: translate(-20%, -20%); } }

        /* Interfaz de Bienvenida */
        #protocol-status { position: absolute; top: 10%; text-align: center; font-size: 1.4em; text-transform: uppercase; text-shadow: 0 0 10px #0ff; opacity: 0.9; }
        
        /* El Núcleo Holográfico (Centro) */
        .core-system { position: relative; width: 120px; height: 120px; }
        .core-visual { position: absolute; width: 100%; height: 100%; border: 2px solid #0ff; border-radius: 50%; box-shadow: 0 0 30px #0ff, 0 0 60px #0ff; animation: pulse 2s ease-in-out infinite; }
        .core-visual::after { content: 'ORI'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 1.2em; text-shadow: 0 0 10px #0ff; }
        @keyframes pulse { 0% { box-shadow: 0 0 30px #0ff, 0 0 60px #0ff; } 50% { box-shadow: 0 0 60px #0ff, 0 0 120px #0ff; } 100% { box-shadow: 0 0 30px #0ff, 0 0 60px #0ff; } }

        /* Paneles de Datos Holográficos (Las Felicitaciones) */
        .hologram-panel { position: absolute; padding: 15px 25px; background: rgba(0, 255, 255, 0.05); border: 2px solid #0ff; border-radius: 5px; box-shadow: 0 0 20px #0ff, inset 0 0 10px #0ff; color: white; backdrop-filter: blur(8px); pointer-events: none; opacity: 0; animation: hologramOpen 4s ease-out forwards; text-align: center; font-size: 1.1em; white-space: nowrap; font-family: 'Segoe UI', sans-serif; font-weight: 500; }
        @keyframes hologramOpen { 0% { transform: translate(-50%, -50%) scale(0.1) rotateY(90deg); opacity: 0; } 15% { transform: translate(-50%, -50%) scale(1.1) rotateY(0deg); opacity: 1; } 85% { transform: translate(-50%, -50%) scale(1) rotateY(0deg); opacity: 1; } 100% { transform: translate(-50%, -150%) scale(0.8) rotateY(-90deg); opacity: 0; } }

        /* Elementos Decorativos de IA */
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #0ff; opacity: 0.5; animation: scan 3s linear infinite; top: 0; pointer-events: none; z-index: 10; }
        @keyframes scan { to { top: 100%; } }
    </style>
</head>
<body>
    
    <div class="grid-background"></div>
    <div class="scanner-line"></div>

    <div id="protocol-status">
        [ PROTOCOLO DE INVESTIDURA INICIADO ]<br>
        >>> ESPERANDO INTERACCIÓN...<br>
        (Toque el núcleo central)
    </div>

    <div class="core-system" onclick="activateHologram()">
        <div class="core-visual"></div>
    </div>

    <script>
        // Mensajes personalizados de éxito, ¡nada de frases cursis!
        const successData = [
            ">>> INVESTIDURA DETECTADA: [ÉXITO]",
            "> TUS DESVELOS HOY SE VUELVEN LUZ 💡",
            "> ASIGNANDO ROL: MEJOR PROFESIONAL 💪",
            "> ORGULLO TOTAL POR TU ESFUERZO ✨",
            "> PROTOCOLO DE BRILLO INICIADO 🌟",
            "> FELICIDADES, LICENCIADA ORI ❤️"
        ];
        let dIndex = 0;

        // Función para activar el holograma
        function activateHologram() {
            const panel = document.createElement('div');
            panel.className = 'hologram-panel';
            panel.innerText = successData[dIndex % successData.length];
            dIndex++;

            const x = window.innerWidth / 2;
            const y = window.innerHeight / 2;
            panel.style.left = x + 'px';
            panel.style.top = y + 'px';

            document.body.appendChild(panel);

            // Cambiar el estatus de la interfaz
            document.getElementById('protocol-status').innerHTML = "[ DATOS DE ÉXITO PROYECTADOS ]<br>>>> SISTEMA OPERATIVO: ÓPTIMO<br>(Vuelva a tocar para más datos)";

            // Eliminar el elemento después de la animación
            setTimeout(() => {
                panel.remove();
            }, 4000);
        }
    </script>
</body>
</html>
