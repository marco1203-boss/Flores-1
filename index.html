<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ori ✨</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Arial', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* Pantalla de Inicio */
        #intro { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 1s; text-align: center; padding: 20px; }
        #intro h1 { font-size: 1.8em; color: #ff85a2; text-shadow: 0 0 15px rgba(255,133,162,0.5); }
        .btn-start { margin-top: 20px; padding: 15px 30px; border: 2px solid #ff85a2; background: none; color: white; border-radius: 30px; font-size: 1.1em; cursor: pointer; }

        /* Contenedor de la Flor */
        #garden { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .flower { position: relative; width: 150px; height: 150px; }
        .center { position: absolute; width: 50px; height: 50px; background: #f1c40f; border-radius: 50%; left: 50px; top: 50px; z-index: 10; box-shadow: 0 0 20px #f1c40f; transition: all 1s; }
        
        .petal { position: absolute; width: 50px; height: 80px; border-radius: 50% 50% 10% 50%; left: 50px; top: -10px; transform-origin: bottom center; transition: transform 1s, opacity 0.5s, top 1s ease-in; cursor: pointer; }

        /* Mensajes y Final */
        .word { position: absolute; color: white; font-weight: bold; font-size: 1.2em; pointer-events: none; animation: floatUp 2s forwards; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
        
        #final-message { display: none; position: absolute; text-align: center; width: 90%; font-size: 2em; color: #ff85a2; text-shadow: 0 0 20px #ff85a2; animation: zoomIn 1s; }
        @keyframes zoomIn { from { scale: 0.5; opacity: 0; } to { scale: 1; opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro">
        <h1>Esto es para ti, Ori...</h1>
        <button class="btn-start" onclick="startExperience()">Presiona la pantalla ✨</button>
    </div>

    <div id="garden">
        <div class="flower">
            <div id="flower-center" class="center"></div>
            <div id="petals-box"></div>
        </div>
    </div>

    <div id="final-message">¡Felicidades por tu investidura!<br>TQM ORI ❤️</div>

    <script>
        const words = ["Inteligente", "Esforzada", "Brillante", "Capaz", "Única", "Exitosa", "Perseverante", "Admirable"];
        const colors = ["#ff4dff", "#33ccff", "#99ff33", "#ffcc00", "#ff6666", "#cc99ff", "#00ffcc", "#ff9900"];
        let petalCount = 8;

        function startExperience() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('garden').style.display = 'flex';
                createPetals();
            }, 1000);
        }

        function createPetals() {
            const box = document.getElementById('petals-box');
            for (let i = 0; i < petalCount; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.backgroundColor = colors[i];
                p.style.transform = `rotate(${i * 45}deg)`;
                p.onclick = function() { dropPetal(this, i); };
                box.appendChild(p);
            }
        }

        function dropPetal(petal, index) {
            if (petal.getAttribute('data-dropped')) return;
            petal.setAttribute('data-dropped', 'true');
            
            // Efecto de caída
            const currentRotation = petal.style.transform;
            petal.style.top = '500px';
            petal.style.opacity = '0';
            petal.style.transform = `${currentRotation} rotate(20deg)`;

            // Mostrar palabra bonita
            const word = document.createElement('div');
            word.className = 'word';
            word.innerText = words[index % words.length];
            word.style.left = window.innerWidth / 2 + 'px';
            word.style.top = window.innerHeight / 2 + 'px';
            document.body.appendChild(word);

            petalCount--;
            if (petalCount === 0) {
                setTimeout(finish, 1000);
            }
        }

        function finish() {
            const center = document.getElementById('flower-center');
            center.style.top = '600px';
            center.style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('garden').style.display = 'none';
                document.getElementById('final-message').style.display = 'block';
            }, 1000);
        }
    </script>
</body>
</html>
