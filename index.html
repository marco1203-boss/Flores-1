<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ori ✨</title>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .flower-container { position: relative; width: 200px; height: 200px; cursor: pointer; transition: transform 0.3s; }
        .flower-container:active { transform: scale(0.9); }
        .center { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fbbf24; border-radius: 50%; transform: translate(-50%, -50%); z-index: 2; box-shadow: 0 0 20px #f59e0b; }
        .petal { position: absolute; top: 50%; left: 50%; width: 60px; height: 80px; background: #ec4899; border-radius: 50% 50% 0 50%; transform-origin: center bottom; transition: all 0.5s; opacity: 0.9; border: 1px solid #f472b6; }
        #message { margin-top: 30px; text-align: center; font-size: 1.2em; height: 1.5em; padding: 0 20px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .hint { position: absolute; bottom: 20px; opacity: 0.6; font-size: 0.8em; }
    </style>
</head>
<body>
    <div id="message">Ori, toca la flor... ✨</div>
    <div class="flower-container" onclick="breakFlower()">
        <div class="center"></div>
        <div id="petals"></div>
    </div>
    <div class="hint">(Algo especial para tu investidura)</div>

    <script>
        const petalColors = ['#ec4899', '#f472b6', '#3b82f6', '#60a5fa', '#a855f7'];
        const phrases = [
            "¡Felicidades por tu investidura! 🎓",
            "Tanto esfuerzo valió la pena ✨",
            "Vas a ser la mejor profesional 💪",
            "¡Qué orgullo verte así! 🌟",
            "Te quiero mucho, Ori ❤️"
        ];
        let pIndex = 0;
        const container = document.getElementById('petals');

        function createPetals() {
            container.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.transform = `translate(-50%, -100%) rotate(${i * 45}deg)`;
                p.style.backgroundColor = petalColors[Math.floor(Math.random() * petalColors.length)];
                container.appendChild(p);
            }
        }

        function breakFlower() {
            const petals = document.querySelectorAll('.petal');
            petals.forEach((p, i) => {
                const angle = i * 45;
                const dist = 200 + Math.random() * 100;
                p.style.transform = `translate(${-50 + Math.cos(angle) * dist}%, ${-100 + Math.sin(angle) * dist}%) rotate(${angle + 90}deg)`;
                p.style.opacity = '0';
            });
            
            document.getElementById('message').innerText = phrases[pIndex % phrases.length];
            pIndex++;

            setTimeout(() => {
                if (petals[0].style.opacity === '0') createPetals();
            }, 1000);
        }

        createPetals();
    </script>
</body>
</html>
