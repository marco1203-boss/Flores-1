<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Regalo Especial para Ori</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #2d132c 0%, #170a16 100%); font-family: 'Georgia', serif; color: white; }
        #instructions { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 1.8em; text-shadow: 0 0 15px #ff69b4; pointer-events: none; z-index: 100; opacity: 0.9; }
        .word-bubble { position: absolute; padding: 10px 20px; background: rgba(255, 105, 180, 0.2); border-radius: 20px; border: 1px solid rgba(255, 105, 180, 0.4); backdrop-filter: blur(5px); pointer-events: none; animation: floatUpAndFade 4s ease-out forwards; text-align: center; font-weight: bold; }
        @keyframes floatUpAndFade { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translate(-50%, -150%) scale(1.2); opacity: 0; } }
    </style>
</head>
<body>

    <div id="instructions">Ori, toca tu rosa de investidura... ✨</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- CONFIGURACIÓN BÁSICA ---
        let scene, camera, renderer, clock, roseGroup;
        let petals = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        
        // Mensajes personalizados para su investidura
        let words = [
            "¡Felicidades por tu Investidura, Ori! ✨",
            "Tus desvelos hoy se vuelven luz 💡",
            "Vas a ser la mejor en lo que haces 👩‍🎓",
            "¡Qué orgullo verte con tu uniforme! 🌟",
            "Eres una inspiración para todos ❤️",
            "¡A brillar este lunes y siempre! 🚀"
        ];
        let wordIndex = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 6); // Vista desde arriba y cerca

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // --- LUCES DE ESTUDIO (Para realismo) ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xff69b4, 1);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            // --- CREACIÓN DE LA ROSA (Forma realista con física) ---
            roseGroup = new THREE.Group();
            scene.add(roseGroup);

            // Centro de la flor (cálido)
            const centerGeometry = new THREE.SphereGeometry(0.3, 16, 16);
            const centerMaterial = new THREE.MeshPhongMaterial({ color: 0xfdcb6e });
            const center = new THREE.Mesh(centerGeometry, centerMaterial);
            roseGroup.add(center);

            // Pétalos realistas (Cápsulas suavizadas)
            const petalGeometry = new THREE.CapsuleGeometry(0.2, 0.6, 6, 12);
            const petalMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xff0040, 
                shininess: 90, 
                transparent: true, 
                opacity: 0.95 
            });

            // Creamos capas de pétalos para dar volumen
            for (let i = 0; i < 5; i++) {
                const layer = new THREE.Group();
                const numPetals = 8 + i * 2;
                for (let j = 0; j < numPetals; j++) {
                    const petal = new THREE.Mesh(petalGeometry, petalMaterial.clone()); // Material único para animar
                    const angle = (j / numPetals) * Math.PI * 2;
                    const radius = 0.6 + i * 0.15;
                    
                    petal.position.x = Math.cos(angle) * radius;
                    petal.position.y = Math.sin(angle) * radius;
                    petal.position.z = Math.sin(radius * 2) * 0.2; // Suave forma de cuenco

                    petal.rotation.z = angle + Math.PI / 2;
                    petal.rotation.x = Math.PI / 8; // Inclinación

                    // Guardamos info para el efecto "romper"
                    petal.userData = { 
                        isPetal: true, 
                        initialPosition: petal.position.clone(),
                        initialRotation: petal.rotation.clone()
                    };
                    layer.add(petal);
                    petals.push(petal);
                }
                roseGroup.add(layer);
            }

            // Tallo (más real, con espinas pequeñas)
            const stemGeometry = new THREE.CylinderGeometry(0.06, 0.1, 4, 12);
            const stemMaterial = new THREE.MeshPhongMaterial({ color: 0x3d3132 });
            const stem = new THREE.Mesh(stemGeometry, stemMaterial);
            stem.position.y = -2;
            scene.add(stem);

            // --- EVENTOS ---
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('click', onDocumentMouseDown, false);
            window.addEventListener('touchstart', onDocumentTouchStart, false); // Soporte para tablet
        }

        // --- INTERACCIÓN ---
        function onDocumentMouseDown(event) {
            event.preventDefault();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            checkIntersection(event.clientX, event.clientY);
        }

        function onDocumentTouchStart(event) {
            if (event.touches.length === 1) {
                event.preventDefault();
                mouse.x = (event.touches[0].pageX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.touches[0].pageY / window.innerHeight) * 2 + 1;
                checkIntersection(event.touches[0].pageX, event.touches[0].pageY);
            }
        }

        function checkIntersection(screenX, screenY) {
            raycaster.setFromCamera(mouse, camera);
            
            // Comprobamos solo los pétalos para el efecto "romper"
            const intersects = raycaster.intersectObjects(petals, false);

            if (intersects.length > 0) {
                const petal = intersects[0].object;
                if (!petal.userData.active) {
                    breakPetal(petal);
                    showWordBubble(screenX, screenY);
                }
            }
        }

        // --- EFECTO DE ROMPER (CAÍDA REALISTA) ---
        function breakPetal(petal) {
            petal.userData.active = true;
            
            // Simulación de física de caída
            const duration = 2.5; // segundos
            const startPosition = petal.position.clone();
            
            // Objetivo aleatorio en el suelo
            const targetPosition = new THREE.Vector3(
                startPosition.x + (Math.random() - 0.5) * 6,
                startPosition.y - 6 - Math.random() * 2,
                startPosition.z + (Math.random() - 0.5) * 6
            );

            // Una pequeña animación de giro aleatorio
            petal.userData.rotationSpeed = {
                x: (Math.random() - 0.5) * 0.1,
                y: (Math.random() - 0.5) * 0.1,
                z: (Math.random() - 0.5) * 0.1
            };

            petal.userData.animationStartTime = clock.elapsedTime;
            petal.userData.animationTarget = targetPosition;
        }

        // --- MOSTRAR PALABRAS FLOTANTES ---
        function showWordBubble(x, y) {
            const bubble = document.createElement('div');
            bubble.className = 'word-bubble';
            bubble.innerText = words[wordIndex % words.length];
            wordIndex++;
            
            // Posicionamos cerca del toque
            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';
            
            document.body.appendChild(bubble);

            // Eliminamos el elemento después de la animación
            setTimeout(() => {
                bubble.remove();
            }, 4000);
        }

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const delta = clock.getDelta();
            const time = clock.elapsedTime;
            
            // La rosa gira suavemente (realismo)
            if (roseGroup) roseGroup.rotation.y = time * 0.1;

            // Actualizamos la caída realista de los pétalos "rotos"
            petals.forEach(petal => {
                if (petal.userData.active && petal.userData.animationTarget) {
                    const elapsed = time - petal.userData.animationStartTime;
                    const duration = 2.5;
                    const progress = Math.min(elapsed / duration, 1);

                    // Interpolación de posición (Caída)
                    petal.position.lerpVectors(petal.userData.initialPosition, petal.userData.animationTarget,
