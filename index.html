<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ori - Felicidades</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #0f172a, #020617); font-family: sans-serif; color: white; }
        #instructions { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 1.2em; z-index: 10; pointer-events: none; text-shadow: 0 0 10px #000; }
        .word-bubble { position: absolute; padding: 10px 20px; background: rgba(255, 255, 255, 0.2); border-radius: 20px; backdrop-filter: blur(5px); pointer-events: none; animation: floatUp 3s forwards; border: 1px solid white; font-weight: bold; }
        @keyframes floatUp { from { transform: translate(-50%, 0); opacity: 1; } to { transform: translate(-50%, -150px); opacity: 0; } }
    </style>
</head>
<body>
    <div id="instructions">Ori, ¡Toca la pantalla para ver tus flores! ✨</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, flowers = [];
        let words = ["¡Felicidades por tu investidura! 🎓", "Eres la mejor ✨", "Orgullo total 💪", "¡A brillar! 🌟", "Te queremos ❤️"];
        let wordIdx = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 0, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            const colors = [0xff4dff, 0x00d2ff, 0x7bed9f];
            colors.forEach((col, i) => {
                const group = new THREE.Group();
                const geom = new THREE.SphereGeometry(0.3, 16, 16);
                const mat = new THREE.MeshPhongMaterial({ color: 0xffff00 });
                group.add(new THREE.Mesh(geom, mat));

                for(let j=0; j<8; j++) {
                    const pGeom = new THREE.CapsuleGeometry(0.15, 0.4, 4, 8);
                    const pMat = new THREE.MeshPhongMaterial({ color: col, transparent: true });
                    const p = new THREE.Mesh(pGeom, pMat);
                    p.rotation.z = (j/8) * Math.PI * 2;
                    p.position.x = Math.cos(p.rotation.z)*0.5;
                    p.position.y = Math.sin(p.rotation.z)*0.5;
                    p.userData = { isPetal: true };
                    group.add(p);
                }
                group.position.x = (i - 1) * 2;
                scene.add(group);
                flowers.push(group);
            });

            window.addEventListener('click', (e) => onInteraction(e.clientX, e.clientY));
            window.addEventListener('touchstart', (e) => onInteraction(e.touches[0].clientX, e.touches[0].clientY));
            animate();
        }

        function onInteraction(x, y) {
            const bubble = document.createElement('div');
            bubble.className = 'word-bubble';
            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';
            bubble.innerText = words[wordIdx % words.length];
            wordIdx++;
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 3000);

            flowers.forEach(f => {
                f.children.forEach(p => {
                    if(p.userData.isPetal) {
                        p.position.x += (Math.random()-0.5)*2;
                        p.position.y -= Math.random();
                        p.material.opacity -= 0.2;
                    }
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            flowers.forEach((f, i) => f.rotation.y += 0.01 * (i+1));
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
